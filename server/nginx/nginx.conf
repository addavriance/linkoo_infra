events {
    worker_connections 2048;
}

http {
    set_real_ip_from 0.0.0.0/0;
    set_real_ip_from 100.64.0.0/10;
    set_real_ip_from 172.18.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Потом уже всё остальное
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

        map $http_x_forwarded_for $client_real_ip {
        "" $remote_addr;
        ~^(?P<first_ip>[^,]+) $first_ip;
    }

    # Логи с реальным IP
    log_format main '$client_real_ip - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    access_log /dev/stdout main buffer=32k flush=5s;
    error_log /dev/stderr warn;

    # Оптимизация
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstream для backend
    upstream backend_api {
        server backend:5000;
    }

    # Upstream для frontend
    upstream frontend_app {
        server frontend:80;
    }

    # HTTP сервер (SSL терминируется на облаке)
    server {
        listen 80;
        server_name _;

        # Безопасность (добавляем заголовки даже через HTTP, т.к. для клиента это HTTPS)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API + WebSocket
        location /api/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        location /api-docs/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location ~ "^/[a-zA-Z0-9_-]{3,20}$" {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            if ($http_user_agent ~* "(Telegrambot|facebookexternalhit|Facebot|Twitterbot|WhatsApp|Discordbot|Slackbot|vkShare|LinkedInBot|Pinterest|SkypeUriPreview|Viber|Line|redditbot|Applebot|YandexBot)") {
                proxy_pass http://backend_api;
            }

            proxy_pass http://frontend_app;
        }

        # Frontend
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Healthcheck
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

