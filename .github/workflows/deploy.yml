name: Deploy Infra to Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify Telegram — push
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ${{ github.event.head_commit.author.name }} pushed to branch <a href="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}">${{ github.ref_name }}</a> of <a href="${{ github.server_url }}/${{ github.repository }}">linkoo_infra</a> (<a href="${{ github.event.compare }}">Compare changes</a>)

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "server/docker-compose.yml"
          target: "/home/${{ secrets.SERVER_USER }}"
          strip_components: 1

      - name: Copy nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "server/nginx/nginx.conf"
          target: "/home/${{ secrets.SERVER_USER }}/nginx"
          strip_components: 2

      - name: Apply changes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}
            docker compose up -d --no-build

      - name: Calculate duration
        id: duration
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          echo "elapsed=$(printf '%02d:%02d' $((ELAPSED/60)) $((ELAPSED%60)))" >> $GITHUB_OUTPUT

      - name: Notify Telegram — result
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} <a href="${{ github.server_url }}/${{ github.repository }}">linkoo_infra</a>: Pipeline <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">#${{ github.run_number }}</a> of branch <a href="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}">${{ github.ref_name }}</a> by ${{ github.event.head_commit.author.name }} (${{ github.actor }}) has ${{ job.status == 'success' && 'passed' || 'failed' }} in ${{ steps.duration.outputs.elapsed }}
